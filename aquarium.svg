<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 120" width="100%" height="100%">
  <defs>
    <!-- እውነተኛ የጥልቅ ባህር ከለር ብቻ (Pure Ocean Gradient) -->
    <linearGradient id="real-ocean" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#001219" />
      <stop offset="35%" stop-color="#005f73" />
      <stop offset="70%" stop-color="#0a9396" />
      <stop offset="100%" stop-color="#94d2bd" />
    </linearGradient>
  </defs>

  <!-- የባህር ውሃ አካል (አጭር ቁመት ያለው) -->
  <rect width="800" height="120" rx="12" fill="url(#real-ocean)" />

  <!-- የውሃ አረፋዎች -->
  <circle cx="200" cy="120" r="3" fill="#ffffff" opacity="0.2">
    <animate attributeName="cy" from="120" to="-20" dur="5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="550" cy="120" r="4" fill="#ffffff" opacity="0.3">
    <animate attributeName="cy" from="120" to="-20" dur="7s" repeatCount="indefinite"/>
  </circle>

  <!-- 🐙 ኦክቶፐስ -->
  <text font-size="34">🐙
    <animate attributeName="x" from="850" to="-60" dur="24s" repeatCount="indefinite" />
    <animate attributeName="y" from="95" to="35" dur="24s" repeatCount="indefinite" />
  </text>

  <!-- 🐠 ሞቃታማ ባለብዙ ከለር ዓሣ -->
  <text font-size="28">🐠
    <animate attributeName="x" from="-50" to="850" dur="12s" repeatCount="indefinite" />
    <animate attributeName="y" from="35" to="65" dur="3s" values="35;65;35" repeatCount="indefinite" />
  </text>

  <!-- 🐟 ሰማያዊ ዓሣ -->
  <text font-size="26">🐟
    <animate attributeName="x" from="850" to="-50" dur="15s" repeatCount="indefinite" />
    <animate attributeName="y" from="30" to="85" dur="15s" repeatCount="indefinite" />
  </text>

  <!-- 🪼 ጄሊፊሽ -->
  <text font-size="26">🪼
    <animate attributeName="x" from="380" to="420" dur="14s" values="380;420;380" repeatCount="indefinite" />
    <animate attributeName="y" from="140" to="-40" dur="14s" repeatCount="indefinite" />
  </text>

  <!-- 🐡 ፑፈር ፊሽ -->
  <text font-size="26">🐡
    <animate attributeName="x" from="-50" to="850" dur="19s" repeatCount="indefinite" />
    <animate attributeName="y" from="85" to="40" dur="19s" repeatCount="indefinite" />
  </text>

  <!-- 🐬 ዶልፊን -->
  <text font-size="32">🐬
    <animate attributeName="x" from="-100" to="900" dur="8s" repeatCount="indefinite" />
    <animate attributeName="y" from="25" to="50" dur="4s" values="25;50;25" repeatCount="indefinite" />
  </text>

  <!-- 🦀 ክራብ -->
  <text font-size="22">🦀
    <animate attributeName="x" from="850" to="-50" dur="21s" repeatCount="indefinite" />
    <animate attributeName="y" from="112" to="112" dur="1s" repeatCount="indefinite" />
  </text>
</svg>
