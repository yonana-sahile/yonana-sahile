<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 160" width="800" height="160">
  <defs>
    <!-- እውነተኛ የቪብራንት ውቅያኖስ ከለር -->
    <linearGradient id="true-ocean" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#03045e" />
      <stop offset="40%" stop-color="#0077b6" />
      <stop offset="75%" stop-color="#0096c7" />
      <stop offset="100%" stop-color="#00b4d8" />
    </linearGradient>
  </defs>

  <!-- የባህር ውሃ አካል -->
  <rect width="800" height="160" rx="12" fill="url(#true-ocean)" />

  <!-- 🏔️ BACKGROUND UNDERWATER MOUNTAINS -->
  <path d="M -50 160 L -50 100 Q 120 60 280 110 T 620 80 Q 720 100 850 85 L 850 160 Z" fill="#023e8a" opacity="0.3"/>
  <path d="M -50 160 L -50 125 Q 180 90 350 125 T 700 105 Q 760 110 850 115 L 850 160 Z" fill="#0077b6" opacity="0.4"/>

  <!-- 🪸 🏔️ HOME ALGAE MOUNTAIN (በቀኝ በኩል የተሰራው የዓሦች መሸሸጊያ ተራራ ቤት) -->
  <path d="M 520 160 Q 640 40 820 110 L 820 160 Z" fill="#005f73" opacity="0.85"/>
  <path d="M 580 160 Q 680 65 830 130 L 830 160 Z" fill="#0a9396" opacity="0.9"/>
  
  <!-- ትናንሽ የቤት ውስጥ ፍጡራን -->
  <text x="630" y="105" font-size="14">🐌</text>
  <text x="690" y="115" font-size="16">🐚</text>
  <text x="740" y="130" font-size="15">🐚</text>

  <!-- የውሃ አረፋዎች ከቤት ውስጥ የሚወጡ -->
  <circle cx="660" cy="110" r="2.5" fill="#ffffff" opacity="0.4">
    <animate attributeName="cy" from="110" to="-20" dur="5s" repeatCount="indefinite"/>
  </circle>

  <!-- 🌿 🌱 DENSE GROUND ALGAE (መሬቱን በሙሉ የሚሞላ አልጌ) -->
  <g>
    <text x="5" y="158" font-size="24" opacity="0.8">🌿<animate attributeName="x" values="5;7;5" dur="4s" repeatCount="indefinite"/></text>
    <text x="45" y="158" font-size="20" opacity="0.8">🌱<animate attributeName="x" values="45;47;45" dur="3s" repeatCount="indefinite"/></text>
    <text x="85" y="158" font-size="22" opacity="0.8">🪸</text>
    <text x="125" y="158" font-size="24" opacity="0.8">🌿<animate attributeName="x" values="125;128;125" dur="4.5s" repeatCount="indefinite"/></text>
    <text x="175" y="158" font-size="20" opacity="0.8">🌱</text>
    <text x="215" y="158" font-size="22" opacity="0.8">🪸</text>
    <text x="255" y="158" font-size="25" opacity="0.8">🌿<animate attributeName="x" values="255;259;255" dur="3.8s" repeatCount="indefinite"/></text>
    <text x="295" y="158" font-size="21" opacity="0.8">🌱</text>
    <text x="335" y="158" font-size="23" opacity="0.8">🪸</text>
    <text x="375" y="158" font-size="26" opacity="0.8">🌿<animate attributeName="x" values="375;378;375" dur="4.2s" repeatCount="indefinite"/></text>
    <text x="415" y="158" font-size="20" opacity="0.8">🌱</text>
    <text x="455" y="158" font-size="22" opacity="0.8">🪸</text>
    <!-- በተራራው ላይ የበቀሉ ጥቅጥቅ ያሉ አልጌዎች -->
    <text x="550" y="145" font-size="25">🌿<animate attributeName="x" values="550;553;550" dur="3.2s" repeatCount="indefinite"/></text>
    <text x="600" y="115" font-size="23">🌿<animate attributeName="x" values="600;604;600" dur="4s" repeatCount="indefinite"/></text>
    <text x="650" y="95" font-size="24">🌿<animate attributeName="x" values="650;653;650" dur="3.5s" repeatCount="indefinite"/></text>
    <text x="710" y="110" font-size="26">🌿<animate attributeName="x" values="710;714;710" dur="4.2s" repeatCount="indefinite"/></text>
    <text x="760" y="135" font-size="22">🪸</text>
  </g>

  <!-- ========================================== -->
  <!-- 🌊 FISH HOME MOVEMENT & ECOSYSTEM ACTIONS 🌊 -->
  <!-- ========================================== -->

  <!-- 🐋 MAJESTIC WHALE (በዶልፊኑ ምትክ የገባ): ከበስተጀርባ ቀስ እያለ በግርማ ሞገስ የሚዋኝ ትልቅ ነባሪል -->
  <g>
    <animateTransform attributeName="transform" type="translate" values="900,50; -150,50" dur="22s" repeatCount="indefinite" />
    <g>
      <!-- Slow 3D depth glide -->
      <animateTransform attributeName="transform" type="scale" values="0.7; 1.1; 0.7" dur="22s" repeatCount="indefinite" />
      <g>
        <!-- Whale tail undulation -->
        <animateTransform attributeName="transform" type="skewY" values="0; 6; -6; 0" dur="1.8s" repeatCount="indefinite" />
        <text x="0" y="0" font-size="44" text-anchor="middle" dominant-baseline="central">🐋</text>
      </g>
    </g>
  </g>

  <!-- 🦈 SHARK 1: ፈጣን እና ኃይለኛ የጭራ መቅዘፍ ያለው ትልቅ አሳኝ ሻርክ -->
  <g>
    <animateTransform attributeName="transform" type="translate" values="-100,60; 900,80" dur="9s" repeatCount="indefinite" />
    <g>
      <animateTransform attributeName="transform" type="scale" values="0.8; 1.4; 0.8" dur="8s" repeatCount="indefinite" />
      <g>
        <animateTransform attributeName="transform" type="skewY" values="0; 15; -15; 0" dur="0.22s" repeatCount="indefinite" />
        <text x="0" y="0" font-size="36" text-anchor="middle" dominant-baseline="central">🦈</text>
      </g>
    </g>
  </g>

  <!-- 🦈 SHARK 2 (NEW): ከቀኝ ወደ ግራ ጥልቁን ባህር እየቀዘፈ በከፍተኛ ፍጥነት የሚሻገር ሁለተኛ ሻርክ -->
  <g>
    <animateTransform attributeName="transform" type="translate" values="900,40; -100,90" dur="11s" repeatCount="indefinite" />
    <g>
      <animateTransform attributeName="transform" type="scale" values="1.1; 0.6; 1.1" dur="11s" repeatCount="indefinite" />
      <g>
        <animateTransform attributeName="transform" type="skewY" values="0; -12; 12; 0" dur="0.25s" repeatCount="indefinite" />
        <text x="0" y="0" font-size="32" text-anchor="middle" dominant-baseline="central">🦈</text>
      </g>
    </g>
  </g>

  <!-- 🐠 TROPICAL FISH: ወደ አልጌ ተራራው ቤት ውስጥ ገብቶ የሚደበቅና የሚወጣ ዓሣ -->
  <g>
    <animateTransform attributeName="transform" type="translate" 
                      values="-60,70; 300,50; 600,90; 660,110; 660,110; 600,90; -60,70" 
                      dur="16s" repeatCount="indefinite" />
    <g>
      <animateTransform attributeName="transform" type="scale" 
                      values="1.3; 1.0; 0.6; 0.3; 0.3; 0.6; 1.3" 
                      dur="16s" repeatCount="indefinite" />
      <g>
        <animateTransform attributeName="transform" type="skewY" values="0; 12; -12; 0" dur="0.35s" repeatCount="indefinite" />
        <text x="0" y="0" font-size="28" text-anchor="middle" dominant-baseline="central">🐠</text>
      </g>
    </g>
  </g>

  <!-- 🐟 REEF RESIDENT: በቤቱ ዙሪያ ብቻ Zoom In/Out እያደረገ የሚጫወት ሰማያዊ ዓሣ -->
  <g>
    <animateTransform attributeName="transform" type="translate" 
                      values="620,100; 720,80; 670,120; 590,90; 620,100" 
                      dur="12s" repeatCount="indefinite" />
    <g>
      <animateTransform attributeName="transform" type="scale" values="0.5; 0.9; 0.4; 0.8; 0.5" dur="12s" repeatCount="indefinite" />
      <g>
        <animateTransform attributeName="transform" type="skewX" values="0; -10; 10; 0" dur="0.4s" repeatCount="indefinite" />
        <text x="0" y="0" font-size="24" text-anchor="middle" dominant-baseline="central">🐟</text>
      </g>
    </g>
  </g>

  <!-- 🐙 OCTOPUS: Jet Propulsion Squish & Stretch -->
  <g>
    <animateTransform attributeName="transform" type="translate" values="500,120; 300,60; -60,110" dur="18s" repeatCount="indefinite" />
    <g>
      <animateTransform attributeName="transform" type="scale" values="1,1; 1.3,0.7; 0.7,1.3; 1,1" dur="1.4s" repeatCount="indefinite" />
      <text x="0" y="0" font-size="32" text-anchor="middle" dominant-baseline="central">🐙</text>
    </g>
  </g>

  <!-- 🐢 SEA TURTLE: Swimming slowly near the ground -->
  <g>
    <animateTransform attributeName="transform" type="translate" values="-70,130; 520,120; -70,130" dur="24s" repeatCount="indefinite" />
    <g>
      <animateTransform attributeName="transform" type="rotate" values="-5; 10; -5" dur="4s" repeatCount="indefinite" />
      <text x="0" y="0" font-size="28" text-anchor="middle" dominant-baseline="central">🐢</text>
    </g>
  </g>

  <!-- 🪼 JELLYFISH: Pulsing Bell Contract -->
  <g>
    <animateTransform attributeName="transform" type="translate" values="280,190; 250,-60" dur="16s" repeatCount="indefinite" />
    <g>
      <animateTransform attributeName="transform" type="scale" values="1,1; 1.3,0.6; 0.8,1.2; 1,1" dur="1.8s" repeatCount="indefinite" />
      <text x="0" y="0" font-size="26" text-anchor="middle" dominant-baseline="central">🪼</text>
    </g>
  </g>

  <!-- 🐡 PUFFER FISH: Inflate Balloon Action -->
  <g>
    <animateTransform attributeName="transform" type="translate" values="-60,80; 400,40; 550,90" dur="20s" repeatCount="indefinite" />
    <g>
      <animateTransform attributeName="transform" type="scale" values="1,1; 1.6,1.6; 1,1" dur="4s" repeatCount="indefinite" />
      <text x="0" y="0" font-size="24" text-anchor="middle" dominant-baseline="central">🐡</text>
    </g>
  </g>

  <!-- 🦀 CRAB: Floor Rocking Crawl -->
  <g>
    <animateTransform attributeName="transform" type="translate" values="520,146; -60,146" dur="20s" repeatCount="indefinite" />
    <g>
      <animateTransform attributeName="transform" type="rotate" values="0; 12; 0; -12; 0" dur="0.5s" repeatCount="indefinite" />
      <text x="0" y="0" font-size="20" text-anchor="middle" dominant-baseline="central">🦀</text>
    </g>
  </g>
</svg>
