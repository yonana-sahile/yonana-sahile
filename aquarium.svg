<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 220" width="100%" height="100%">
  <defs>
    <!-- እውነተኛ የባህር ውሃ ከለር ግራዲያንት (Real Ocean Gradient) -->
    <linearGradient id="real-ocean" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#001219" />
      <stop offset="35%" stop-color="#005f73" />
      <stop offset="70%" stop-color="#0a9396" />
      <stop offset="100%" stop-color="#94d2bd" />
    </linearGradient>
  </defs>

  <!-- የባህር ውሃ አካል -->
  <rect width="800" height="220" rx="15" fill="url(#real-ocean)" />

  <!-- የተፈጥሮ ውሃ አረፋዎች (Bubbles) -->
  <circle cx="200" cy="220" r="4" fill="#ffffff" opacity="0.3">
    <animate attributeName="cy" from="220" to="-20" dur="7s" repeatCount="indefinite"/>
  </circle>
  <circle cx="550" cy="220" r="5" fill="#ffffff" opacity="0.4">
    <animate attributeName="cy" from="220" to="-20" dur="9s" repeatCount="indefinite"/>
  </circle>

  <!-- 🐙 ኦክቶፐስ፡ ከታች ቀኝ ተነስቶ ወደ ላይ ግራ በዲያጎናል መስመር ይዋኛል -->
  <text font-size="42">🐙
    <animate attributeName="x" from="850" to="-60" dur="26s" repeatCount="indefinite" />
    <animate attributeName="y" from="190" to="50" dur="26s" repeatCount="indefinite" />
  </text>

  <!-- 🐠 ሞቃታማ ባለብዙ ከለር ዓሣ፡ ከግራ ወደ ቀኝ በሞገድ (Wavy) ይዋኛል -->
  <text font-size="36">🐠
    <animate attributeName="x" from="-50" to="850" dur="13s" repeatCount="indefinite" />
    <animate attributeName="y" from="60" to="100" dur="3s" values="60;100;60" repeatCount="indefinite" />
  </text>

  <!-- 🐟 ሰማያዊ ዓሣ፡ ከቀኝ ወደ ግራ ወደ ታች እየጠለቀ (Diving Down) ይዋኛል -->
  <text font-size="33">🐟
    <animate attributeName="x" from="850" to="-50" dur="16s" repeatCount="indefinite" />
    <animate attributeName="y" from="50" to="170" dur="16s" repeatCount="indefinite" />
  </text>

  <!-- 🪼 ሮዝ ጄሊፊሽ፡ ከባህሩ ወለል ቀጥታ ወደ ላይ በአቀባዊ ይንሳፈፋል -->
  <text font-size="32">🪼
    <animate attributeName="x" from="380" to="440" dur="18s" values="380;440;380" repeatCount="indefinite" />
    <animate attributeName="y" from="240" to="-50" dur="18s" repeatCount="indefinite" />
  </text>

  <!-- 🐡 ቢጫ ፑፈር ፊሽ፡ ከግራ ወደ ቀኝ በግልብጥ ዲያጎናል (Diagonal Up) ይዋኛል -->
  <text font-size="34">🐡
    <animate attributeName="x" from="-50" to="850" dur="21s" repeatCount="indefinite" />
    <animate attributeName="y" from="160" to="90" dur="21s" repeatCount="indefinite" />
  </text>

  <!-- 🐬 ዶልፊን፡ በባህሩ የላይኛው ክፍል በፍጥነት ይሻገራል -->
  <text font-size="40">🐬
    <animate attributeName="x" from="-100" to="900" dur="9s" repeatCount="indefinite" />
    <animate attributeName="y" from="40" to="70" dur="4s" values="40;70;40" repeatCount="indefinite" />
  </text>

  <!-- 🦀 ቀይ ክራብ፡ በባህሩ ወለል ላይ ብቻ ወደ ግራ ይሳባል -->
  <text font-size="26">🦀
    <animate attributeName="x" from="850" to="-50" dur="23s" repeatCount="indefinite" />
    <animate attributeName="y" from="205" to="205" dur="1s" repeatCount="indefinite" />
  </text>

  <!-- መካከለኛ ፕሮፌሽናል ጽሑፍ -->
  <text x="50%" y="50%" font-family="'Space Grotesk', sans-serif" font-weight="bold" font-size="22" fill="#ffffff" text-anchor="middle" opacity="0.75" letter-spacing="4">
    AQUATIC SECURE ECOSYSTEM
  </text>
</svg>
