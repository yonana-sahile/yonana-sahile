<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 160" width="800" height="160">
  <defs>
    <!-- እውነተኛ የቪብራንት ውቅያኖስ ከለር (Deep Abyssal Blue to Tropical Cyan) -->
    <linearGradient id="true-ocean" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#03045e" />
      <stop offset="40%" stop-color="#0077b6" />
      <stop offset="75%" stop-color="#0096c7" />
      <stop offset="100%" stop-color="#00b4d8" />
    </linearGradient>
  </defs>

  <!-- የባህር ውሃ አካል (ቁመቱ ከፍ ያለና ውብ) -->
  <rect width="800" height="160" rx="12" fill="url(#true-ocean)" />

  <!-- የውሃ አረፋዎች -->
  <circle cx="300" cy="160" r="3" fill="#ffffff" opacity="0.25">
    <animate attributeName="cy" from="160" to="-20" dur="6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="500" cy="160" r="4" fill="#ffffff" opacity="0.2">
    <animate attributeName="cy" from="160" to="-20" dur="8s" repeatCount="indefinite"/>
  </circle>

  <!-- 🐠 ባለብዙ ከለር ዓሣ፡ ከታች ግራ ተነስቶ ወደ ላይ ቀኝ ስክሪኑን ጥሶ ይወጣል (Diagonal Up & Out) -->
  <text font-size="30">🐠
    <animate attributeName="x" from="-60" to="860" dur="14s" repeatCount="indefinite" />
    <animate attributeName="y" from="180" to="-40" dur="14s" repeatCount="indefinite" />
  </text>

  <!-- 🐟 ሰማያዊ ዓሣ፡ ከቀኝ ተነስቶ ወደ ግራ በዚግዛግ ሞገድ ስክሪኑን ጥሶ ይወጣል (Wavy Random Exit) -->
  <text font-size="28">🐟
    <animate attributeName="x" from="860" to="-60" dur="17s" repeatCount="indefinite" />
    <animate attributeName="y" from="40" to="40" dur="4s" values="40;130;30;110;40" repeatCount="indefinite" />
  </text>

  <!-- 🪼 ጄሊፊሽ፡ ከስክሪኑ በታች ተደብቆ ተነስቶ ወደ ላይ ሙሉ በሙሉ ወጥቶ ይጠፋል (Bottom-to-Top Out) -->
  <text font-size="28">🪼
    <animate attributeName="x" from="400" to="400" dur="16s" values="400;450;380;400" repeatCount="indefinite" />
    <animate attributeName="y" from="200" to="-60" dur="16s" repeatCount="indefinite" />
  </text>

  <!-- 🐙 ኦክቶፐስ፡ ከቀኝ ተነስቶ ወደ ግራ በባህሩ ወለል ላይ በዘፈቀደ እየተወዛወዘ ይሄዳል -->
  <text font-size="34">🐙
    <animate attributeName="x" from="860" to="-60" dur="25s" repeatCount="indefinite" />
    <animate attributeName="y" from="130" to="130" dur="5s" values="130;95;140;110;130" repeatCount="indefinite" />
  </text>

  <!-- 🐡 ፑፈር ፊሽ፡ ከግራ ወደ ቀኝ መሃል ላይ ቀስ እያለ ይዋኛል -->
  <text font-size="26">🐡
    <animate attributeName="x" from="-60" to="860" dur="20s" repeatCount="indefinite" />
    <animate attributeName="y" from="110" to="50" dur="20s" repeatCount="indefinite" />
  </text>

  <!-- 🦈 ሻርክ/ዶልፊን፡ በባህሩ ውስጥ በከፍተኛ ፍጥነት ይሻገራል -->
  <text font-size="36">🦈
    <animate attributeName="x" from="-100" to="900" dur="9s" repeatCount="indefinite" />
    <animate attributeName="y" from="60" to="90" dur="3s" values="60;90;60" repeatCount="indefinite" />
  </text>

  <!-- 🦀 ክራብ፡ በባህሩ ወለል ጫፍ ላይ ትሳባለች -->
  <text font-size="22">🦀
    <animate attributeName="x" from="860" to="-60" dur="22s" repeatCount="indefinite" />
    <animate attributeName="y" from="148" to="148" dur="1s" repeatCount="indefinite" />
  </text>
</svg>
