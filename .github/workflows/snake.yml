name: Generate Snake Animation

on:
  schedule:
    # በየ 12 ሰዓቱ ራሱን አፕዴት ያደርጋል
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches:
    - main

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Generate github-contribution-grid-snake.svg WITH PREMIUM NEON PALETTE
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=#00F7FF&color_dots=#161233,#302b63,#6e40c9,#00f7ff,#ffffff
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=#00F7FF&color_dots=#161233,#302b63,#6e40c9,#00f7ff,#ffffff

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
